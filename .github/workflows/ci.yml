name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libswe-dev

      - name: Install Python dependencies
        # uv.lock is the canonical Python resolver output. --frozen makes any
        # pyproject/lock drift a hard failure instead of silently re-resolving.
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen --extra dev

      - name: Cache Swiss Ephemeris data
        id: ephe-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: /tmp/ephe
          key: swisseph-${{ hashFiles('ephemeris.lock.json') }}

      - name: Fetch locked Swiss Ephemeris data (cache miss only)
        if: steps.ephe-cache.outputs.cache-hit != 'true'
        run: uv run python scripts/fetch_ephemeris.py --destination /tmp/ephe

      - name: Verify locked Swiss Ephemeris data
        run: uv run python scripts/fetch_ephemeris.py --destination /tmp/ephe --verify-only --print-lock-id

      - name: Run tests with coverage
        run: uv run pytest -v --tb=short --cov=bazi_engine --cov-report=term-missing --cov-fail-under=75
        env:
          SE_EPHE_PATH: /tmp/ephe

      - name: Generate coverage XML
        if: matrix.python-version == '3.12'
        run: uv run coverage xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Check OpenAPI spec drift
        run: uv run python scripts/export_openapi.py --check
        env:
          SE_EPHE_PATH: /tmp/ephe

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen --extra dev

      - name: Run mypy
        run: uv run mypy bazi_engine --ignore-missing-imports

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen --extra dev

      - name: Run ruff check
        run: uv run ruff check bazi_engine/ tests/ scripts/ --output-format=github

      - name: Assert immutable release toolchain inputs
        run: uv run python scripts/assert_toolchain_versions.py

  complexity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen --extra dev

      - name: Complexity gate (CC>15 for new code)
        run: uv run python scripts/check_complexity.py --check

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install locked dependencies and security tools
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen --extra dev

      # --no-deps + --disable-pip audits exactly the pinned lock lines (what
      # the prod image installs) without resolving or building an ephemeral
      # env — deterministic and hermetic. No --ignore-vuln: the lockfile is
      # clean (starlette>=1.3.1 + idna>=3.18 fixed the 2026 CVEs). If a new
      # advisory lands, fix it (re-lock) rather than suppressing it here.
      - name: Audit locked dependencies and generate CycloneDX SBOM
        run: |
          uv export --frozen --no-emit-project --format requirements-txt --output-file /tmp/runtime.requirements.txt
          uv run pip-audit -r /tmp/runtime.requirements.txt --strict --no-deps --disable-pip \
            --format cyclonedx-json --output sbom.cdx.json

      - name: SAST (bandit, medium+ severity)
        if: always()
        run: uv run bandit -r bazi_engine -ll

      - name: Validate and upload dependency SBOM
        if: always()
        run: uv run python scripts/validate_sbom.py sbom.cdx.json

      - name: Build hash-addressed release evidence manifest
        if: always()
        run: >-
          uv run python scripts/build_release_evidence.py
          --sbom sbom.cdx.json
          --output release-evidence.json

      - name: Upload dependency SBOM
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-dependency-sbom
          path: |
            sbom.cdx.json
            release-evidence.json
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build image (validates ephemeris SHA + multi-stage build)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          push: false
          tags: fufire-engine:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  distribution:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install pinned build frontend
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29 setuptools==80.9.0 wheel==0.45.1 build==1.3.0
          uv export --frozen --no-emit-project --format requirements-txt --output-file /tmp/runtime.requirements.txt

      - name: Build and inspect wheel and sdist
        run: |
          python -m build --wheel --sdist
          python scripts/verify_distribution.py dist/*

      - name: Clean-install wheel and sdist outside the checkout
        run: |
          python -m venv /tmp/fufire-wheel
          /tmp/fufire-wheel/bin/python -m pip install pip==26.1.2
          /tmp/fufire-wheel/bin/python -m pip install --require-hashes -r /tmp/runtime.requirements.txt
          /tmp/fufire-wheel/bin/python -m pip install --no-deps dist/*.whl
          (cd /tmp && /tmp/fufire-wheel/bin/python "$GITHUB_WORKSPACE/scripts/distribution_smoke.py")

          python -m venv /tmp/fufire-sdist
          /tmp/fufire-sdist/bin/python -m pip install pip==26.1.2 setuptools==80.9.0 wheel==0.45.1
          /tmp/fufire-sdist/bin/python -m pip install --require-hashes -r /tmp/runtime.requirements.txt
          /tmp/fufire-sdist/bin/python -m pip install --no-build-isolation --no-deps dist/*.tar.gz
          (cd /tmp && /tmp/fufire-sdist/bin/python "$GITHUB_WORKSPACE/scripts/distribution_smoke.py")

  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22.21.1"
          cache: npm

      - name: Install locked contract toolchain
        run: npm ci --ignore-scripts

      - name: Validate OpenAPI spec
        run: npx --no-install redocly lint spec/openapi/openapi.json --skip-rule security-defined --skip-rule no-path-trailing-slash

      - name: Prepare OpenAPI CodeGen spec
        run: node scripts/prepare-openapi-codegen-spec.mjs

      - name: Generate TypeScript client
        uses: docker://openapitools/openapi-generator-cli:v7.6.0@sha256:f86ca824293602b71b9b66683cc0011f8ff963858bd853621c554ff5cc7dd1d5
        with:
          args: >-
            generate
            -i spec/openapi/openapi.codegen.json
            -g typescript-fetch
            -o /github/workspace/generated/ts-client
            --openapi-normalizer DISABLE_ALL=true
            --additional-properties=prefixParameterInterfaces=true,stringEnums=true,withoutRuntimeChecks=true

      - name: Fix generated file ownership
        run: sudo chown -R $(id -u):$(id -g) generated/ts-client

      - name: Compile generated client
        run: |
          cd generated/ts-client
          ../../node_modules/.bin/tsc --noEmit --esModuleInterop --target es2020 --module node16 --moduleResolution node16 index.ts

  # Publishes the OpenAPI contract with sha256+commit provenance so downstream
  # consumers can pin against an auditable artifact (contract authority, FUFIRE-001).
  contract-artifact:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      # pyswisseph links the native libswe at import time; without it,
      # `import bazi_engine` (→ import swisseph) raises
      # "libswe.so.2.0: cannot open shared object file" before the spec can be
      # generated. Mirrors the `test` job's system-dependency step.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libswe-dev

      - name: Install package
        run: |
          python -m pip install pip==26.1.2 uv==0.11.29
          uv sync --frozen

      - name: Verify contract is drift-free
        run: uv run python scripts/export_openapi.py --check

      - name: Write provenance (sha256 + commit)
        run: |
          python - <<'EOF'
          import hashlib, json, os

          spec_path = "spec/openapi/openapi.json"
          raw = open(spec_path, "rb").read()
          provenance = {
              "artifact": spec_path,
              "sha256": hashlib.sha256(raw).hexdigest(),
              "commit": os.environ["GITHUB_SHA"],
              "ref": os.environ["GITHUB_REF"],
              "version": json.loads(raw)["info"]["version"],
          }
          with open("openapi.provenance.json", "w") as fh:
              json.dump(provenance, fh, indent=2)
          print(json.dumps(provenance, indent=2))
          EOF

      - name: Upload contract artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openapi-contract
          path: |
            spec/openapi/openapi.json
            openapi.provenance.json

  # This is the only check that branch protection needs to require. It runs
  # even when an upstream job failed or was skipped and fails closed unless
  # every mandatory job completed successfully.
  release-gate:
    name: release-gate
    if: always()
    needs:
      - test
      - typecheck
      - lint
      - complexity
      - security
      - docker-build
      - distribution
      - codegen
      - contract-artifact
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Require every release job to succeed
        env:
          TEST_RESULT: ${{ needs.test.result }}
          TYPECHECK_RESULT: ${{ needs.typecheck.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          COMPLEXITY_RESULT: ${{ needs.complexity.result }}
          SECURITY_RESULT: ${{ needs.security.result }}
          DOCKER_BUILD_RESULT: ${{ needs['docker-build'].result }}
          DISTRIBUTION_RESULT: ${{ needs.distribution.result }}
          CODEGEN_RESULT: ${{ needs.codegen.result }}
          CONTRACT_ARTIFACT_RESULT: ${{ needs['contract-artifact'].result }}
        run: |
          python - <<'PY'
          import os

          results = {
              key.removesuffix("_RESULT").lower(): value
              for key, value in os.environ.items()
              if key.endswith("_RESULT")
          }
          failed = {name: result for name, result in results.items() if result != "success"}
          print("mandatory job results:", results)
          if failed:
              raise SystemExit(f"release-gate blocked: {failed}")
          PY
